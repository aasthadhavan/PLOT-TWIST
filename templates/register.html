<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotTwist - Join the Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #faf8f6;
            --bg-secondary: #f5f1ed;
            --accent-pink: #f4b4d4;
            --accent-lavender: #d4c5f9;
            --accent-mint: #b4e7e1;
            --accent-peach: #f5d7c8;
            --accent-blue: #c5e4f9;
            --text-dark: #5a5156;
            --text-light: #8b7d84;
            --text-muted: #b8adb5;
            --border-light: #e8dfe5;
            --shadow: rgba(90, 81, 86, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #faf8f6 0%, #f5f1ed 50%, #f8f3f0 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 40px 20px;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-pink);
            top: 10%;
            left: 10%;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: var(--accent-lavender);
            bottom: 10%;
            right: 10%;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px var(--shadow);
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-lavender) 50%, var(--accent-mint) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Progress bar */
        .progress-container {
            margin-bottom: 32px;
        }

        .progress-bar {
            height: 3px;
            background: var(--border-light);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink) 0%, var(--accent-lavender) 100%);
            width: 50%;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-step {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
            animation: slideInUp 0.6s ease;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-dark);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 3px rgba(244, 180, 212, 0.1);
        }

        .terms-group {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-top: 20px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--accent-pink);
            flex-shrink: 0;
        }

        .terms-text {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .terms-text a {
            color: var(--accent-pink);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .terms-text a:hover {
            color: var(--accent-lavender);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-lavender) 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(244, 180, 212, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(244, 180, 212, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid var(--border-light);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--accent-pink);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease 0.3s backwards;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--accent-pink);
            margin-bottom: 12px;
            font-weight: bold;
        }

        .success-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }

            .logo {
                font-size: 32px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">PlotTwist</div>
                <div class="subtitle">Create your account</div>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <div class="success-title">Welcome!</div>
                <div class="success-text">Your account is ready. Let's begin your story...</div>
                <a href="/dashboard" style="color: var(--accent-pink); text-decoration: none; font-weight: 600;">Enter Dashboard →</a>
            </div>

            <form id="registrationForm" method="POST" action="/register" style="display: block;">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">Step 1 of 2</div>
                </div>

                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Your story identity" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-step" id="step2">
                    <div class="form-group">
                        <label>Welcome, Story Explorer!</label>
                        <p style="font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px;">
                            You're about to enter a world of mystery and branching choices. Each decision shapes your reality.
                        </p>
                    </div>
                    <div class="terms-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms" class="terms-text">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" id="backBtn" onclick="previousStep()" style="display: none;">← Back</button>
                    <button type="button" class="btn btn-primary" id="nextBtn" onclick="nextStep()">Next →</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 2;

        function updateProgress() {
            const progress = (currentStep / totalSteps) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Step ${currentStep} of ${totalSteps}`;
            document.getElementById('backBtn').style.display = currentStep === 1 ? 'none' : 'block';
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.textContent = currentStep === totalSteps ? 'Create Account' : 'Next →';
        }

        function showStep(step) {
            document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
        }

        function nextStep() {
            if (currentStep === 1) {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (!username || !password || !confirmPassword) {
                    alert('Please fill in all fields');
                    return;
                }
                if (password.length < 6) {
                    alert('Password must be at least 6 characters');
                    return;
                }
                if (password !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }
            } else if (currentStep === 2) {
                const terms = document.getElementById('terms').checked;
                if (!terms) {
                    alert('Please accept the terms and conditions');
                    return;
                }
                document.getElementById('registrationForm').submit();
                return;
            }

            if (currentStep < totalSteps) {
                currentStep++;
                showStep(currentStep);
                updateProgress();
            }
        }

        function previousStep() {
            if (currentStep > 1) {
                currentStep--;
                showStep(currentStep);
                updateProgress();
            }
        }

        updateProgress();
    </script>
</body>
</html>
