<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotTwist — Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#F8FAFC;
    --card:#FFFFFF;
    --primary:#7C3AED;
    --primary-hover:#6D28D9;
    --accent:#0D9488;
    --text:#1E293B;
    --muted:#64748B;
    --error:#EF4444;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
    background-image:
        radial-gradient(at 0% 0%,rgba(124,58,237,0.05),transparent 50%),
        radial-gradient(at 100% 100%,rgba(13,148,136,0.05),transparent 50%);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
}

.card{
    width:420px;
    background:var(--card);
    padding:48px;
    border-radius:24px;
    box-shadow:
        0 20px 40px rgba(0,0,0,0.05),
        0 0 0 1px rgba(0,0,0,0.02);
    animation:slideUp .6s ease;
}

@keyframes slideUp{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.logo{
    font-family:'Cinzel',serif;
    font-size:32px;
    letter-spacing:4px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:14px;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
}

/* FLASH MESSAGE */
.flash{
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    font-size:13px;
}

.flash-error{
    background:#FEF2F2;
    border:1px solid #FEE2E2;
    color:var(--error);
}

.flash-success{
    background:#ECFDF5;
    border:1px solid #A7F3D0;
    color:#065F46;
}

.form-group{
    margin-bottom:22px;
}

label{
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:6px;
    display:block;
    text-transform:uppercase;
}

input{
    width:100%;
    padding:12px 15px;
    border-radius:12px;
    border:2px solid transparent;
    background:#F1F5F9;
    font-size:15px;
}

input:focus{
    outline:none;
    background:white;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(124,58,237,.1);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 4px 12px rgba(124,58,237,.25);
}

button:hover{
    background:var(--primary-hover);
    transform:translateY(-1px);
}

.footer{
    margin-top:28px;
    text-align:center;
    font-size:14px;
    color:var(--muted);
}

.footer a{
    color:var(--primary);
    text-decoration:none;
    font-weight:600;
}

.footer a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <div class="logo">PLOTTWIST</div>
        <div class="subtitle">Initialize Identity</div>
    </div>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash flash-{{category}}">
                    {{ '⚠' if category=='error' else '✓' }} {{message}}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- REGISTER FORM -->
    <form method="POST">

        <div class="form-group">
            <label>Desired Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>New Access Key</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Register Operative</button>

    </form>

    <div class="footer">
        Known operative?
        <a href="{{ url_for('login') }}">Sign In</a>
    </div>

</div>

</body>
</html>
