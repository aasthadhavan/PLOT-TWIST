<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot Twist - Game</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden;
        }
        .floating-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 60px;
            width: 85%; max-width: 800px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: floatAnim 6s ease-in-out infinite;
        }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }
        h1 { color: #4ecca3; font-size: 2.5rem; margin-bottom: 20px; }
        p { font-size: 1.3rem; line-height: 1.8; opacity: 0.85; margin-bottom: 40px; }
        .choices { display: flex; flex-direction: column; gap: 20px; }
        .btn {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            color: #4ecca3;
            padding: 15px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #4ecca3; color: #1a1a2e; transform: scale(1.05); }
        .exit-btn { border-color: #e94560; color: #e94560; }
        .exit-btn:hover { background: #e94560; color: white; }
    </style>
</head>
<body>
    <div class="floating-card">
        <h1>{{ node.title if node.title else "STORY FRAGMENT" }}</h1>
        <p>{{ node.text }}</p>
        <div class="choices">
            {% if not is_ending %}
                {% for choice in node.choices %}
                    <a href="{{ url_for('play', story_id=story_id, node_id=choice.id) }}" class="btn">
                        {{ choice.label }}
                    </a>
                {% endfor %}
            {% else %}
                <p><strong>Timeline Concluded.</strong></p>
                <a href="{{ url_for('dashboard') }}" class="btn exit-btn">Return to Dashboard</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
<!-- UI updated: Glassmorphism floating cards -->
