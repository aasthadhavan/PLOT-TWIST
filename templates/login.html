<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotTwist - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Soft Pastel Colors */
            --bg-primary: #faf8f6;
            --bg-secondary: #f5f1ed;
            --accent-pink: #f4b4d4;
            --accent-lavender: #d4c5f9;
            --accent-mint: #b4e7e1;
            --accent-peach: #f5d7c8;
            --accent-blue: #c5e4f9;
            --text-dark: #5a5156;
            --text-light: #8b7d84;
            --text-muted: #b8adb5;
            --border-light: #e8dfe5;
            --shadow: rgba(90, 81, 86, 0.08);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #faf8f6 0%, #f5f1ed 50%, #f8f3f0 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #f4b4d4 0%, #d4c5f9 25%, #b4e7e1 50%, #f5d7c8 75%, #c5e4f9 100%);
            opacity: 0.08;
            animation: gradientShift 15s ease infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -10px); }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-pink);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: var(--accent-lavender);
            top: 60%;
            right: 10%;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: var(--accent-mint);
            bottom: 10%;
            left: 20%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            33% { transform: translateY(-20px) translateX(10px); }
            66% { transform: translateY(20px) translateX(-10px); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px var(--shadow);
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease 0.1s backwards;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-lavender) 50%, var(--accent-mint) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 12px;
            font-style: italic;
            font-weight: 300;
        }

        /* Form group */
        .form-group {
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-dark);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 3px rgba(244, 180, 212, 0.1);
        }

        /* Form footer */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 13px;
            animation: fadeIn 0.8s ease 0.4s backwards;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-light);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-pink);
        }

        .forgot-link {
            color: var(--accent-pink);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        .forgot-link:hover {
            color: var(--accent-lavender);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-lavender) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease 0.5s backwards;
            box-shadow: 0 8px 20px rgba(244, 180, 212, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(244, 180, 212, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Signup link */
        .signup-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-light);
            animation: fadeIn 0.8s ease 0.6s backwards;
        }

        .signup-link a {
            color: var(--accent-pink);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--accent-lavender);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            animation: fadeIn 0.8s ease 0.3s backwards;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        .divider-text {
            padding: 0 12px;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Social buttons */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            animation: fadeIn 0.8s ease 0.4s backwards;
        }

        .social-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-dark);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--accent-pink);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .card {
                padding: 32px 24px;
            }

            .logo {
                font-size: 36px;
            }

            .form-footer {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">PlotTwist</div>
                <div class="tagline">Welcome Back</div>
                <div class="subtitle">Where reality bends</div>
            </div>

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your identity" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-footer">
                    <label class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="/forgot" class="forgot-link">Forgot?</a>
                </div>

                <button type="submit" class="btn">Login</button>
            </form>

            <div class="signup-link">
                New here? <a href="/register">Create account</a>
            </div>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">Or continue with</div>
                <div class="divider-line"></div>
            </div>

            <div class="social-buttons">
                <button class="social-btn">Google</button>
                <button class="social-btn">GitHub</button>
            </div>
        </div>
    </div>
</body>
</html>
